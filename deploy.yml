- name: Deploy Maven Artifact
  hosts: web
  become: yes

  tasks:
    - name: Copy JAR file
      copy:
        src: /var/lib/jenkins/workspace/maven-example/target/maven-example-1.0-SNAPSHOT.jar
        dest: /opt/maven-example-1.0-SNAPSHOT.jar
        mode: '0755'

    - name: Run application
      shell: nohup java -jar /opt/maven-example-1.0-SNAPSHOT.jar > /dev/null 2>&1 &
